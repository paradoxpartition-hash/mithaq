<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Payment — Mithaq</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --emerald:#0F3D2E; --emerald-dk:#0A2B1F; --gold:#C6A75E;
      --offwhite:#F8F7F3; --white:#FFFFFF; --charcoal:#1E1E1E;
      --muted:#6B6B6B; --border:#D8D4C9; --error:#C0392B;
      --f-display:'Cormorant Garamond',Georgia,serif;
      --f-body:'DM Sans',system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--offwhite);color:var(--charcoal);font-family:var(--f-body);
         font-weight:300;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
    a{text-decoration:none;color:inherit;}

    /* Header */
    .site-header{background:var(--offwhite);border-bottom:1px solid var(--border);padding:0 24px;}
    .header-inner{max-width:680px;margin:0 auto;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .logo{display:flex;align-items:center;gap:12px;}
    .logo-text{font-family:var(--f-display);font-size:1.25rem;font-weight:600;letter-spacing:0.05em;}
    .secure-badge{display:flex;align-items:center;gap:6px;font-size:0.6875rem;font-weight:500;
                  letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}

    /* Main */
    main{flex:1;max-width:680px;width:100%;margin:48px auto;padding:0 24px;}
    .breadcrumb{font-size:0.6875rem;letter-spacing:0.16em;text-transform:uppercase;
                color:var(--muted);margin-bottom:8px;}
    .breadcrumb a:hover{color:var(--charcoal);}
    .gold-rule{display:block;width:48px;height:1px;background:var(--gold);margin-bottom:12px;}
    .label{font-family:var(--f-body);font-size:0.6875rem;font-weight:500;letter-spacing:0.16em;
           text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
    h1{font-family:var(--f-display);font-size:clamp(1.75rem,4vw,2.25rem);font-weight:500;
       margin-bottom:8px;line-height:1.1;}
    .page-sub{font-size:0.875rem;color:var(--muted);line-height:1.6;margin-bottom:32px;}

    /* Card */
    .card{border:1px solid var(--border);background:var(--white);padding:28px 32px;margin-bottom:16px;}
    .card-title{font-family:var(--f-body);font-size:0.6875rem;font-weight:500;letter-spacing:0.14em;
                text-transform:uppercase;color:var(--muted);margin-bottom:16px;}

    /* Package summary */
    .pkg-row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
    .pkg-info{flex:1;min-width:200px;}
    .pkg-name{font-family:var(--f-display);font-size:1.25rem;font-weight:500;color:var(--charcoal);margin-bottom:4px;}
    .pkg-tag{font-size:0.8125rem;color:var(--muted);}
    .pkg-price{text-align:right;}
    .pkg-amount{font-family:var(--f-display);font-size:1.5rem;font-weight:500;color:var(--charcoal);}
    .pkg-once{font-size:0.6875rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:2px;}

    /* Features */
    .features{list-style:none;padding:0;margin-top:8px;border-top:1px solid var(--border);padding-top:16px;}
    .feat{display:flex;align-items:flex-start;gap:10px;font-size:0.8125rem;color:var(--charcoal);
          padding:6px 0;}
    .feat svg{flex-shrink:0;margin-top:2px;}

    /* Form */
    .form-group{margin-bottom:20px;}
    .form-label{display:block;font-size:0.6875rem;font-weight:500;letter-spacing:0.14em;
                text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .form-input{width:100%;padding:12px 14px;border:1px solid var(--border);background:var(--white);
                font-family:var(--f-body);font-size:0.9375rem;color:var(--charcoal);
                transition:border-color 0.2s;}
    .form-input:focus{outline:none;border-color:var(--emerald);}
    .form-help{font-size:0.75rem;color:var(--muted);margin-top:6px;}

    /* Total row */
    .total-row{display:flex;justify-content:space-between;align-items:center;
               padding:16px 0;border-top:1px solid var(--border);margin-top:16px;}
    .total-label{font-size:0.875rem;font-weight:500;color:var(--charcoal);}
    .total-amount{font-family:var(--f-display);font-size:1.625rem;font-weight:500;color:var(--charcoal);}

    /* Currency note */
    .currency-note{background:var(--offwhite);border:1px solid var(--border);border-left:3px solid var(--gold);
                   padding:12px 16px;font-size:0.75rem;color:var(--muted);line-height:1.6;margin-bottom:16px;}

    /* Buttons */
    .btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;
                 width:100%;padding:16px 32px;background:var(--emerald);color:var(--offwhite);
                 font-family:var(--f-body);font-size:0.8125rem;font-weight:500;letter-spacing:0.08em;
                 text-transform:uppercase;border:1px solid var(--emerald);cursor:pointer;
                 transition:background 0.2s;margin-top:8px;}
    .btn-primary:hover:not(:disabled){background:var(--emerald-dk);}
    .btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
    .btn-secondary{display:block;width:100%;padding:14px 32px;background:transparent;color:var(--emerald);
                   font-family:var(--f-body);font-size:0.8125rem;font-weight:500;letter-spacing:0.08em;
                   text-transform:uppercase;text-align:center;border:1px solid var(--border);
                   cursor:pointer;transition:background 0.2s,color 0.2s;margin-top:12px;}
    .btn-secondary:hover{border-color:var(--emerald);}

    /* Trust row */
    .trust-row{display:flex;align-items:center;justify-content:center;gap:24px;
               margin-top:24px;font-size:0.75rem;color:var(--muted);flex-wrap:wrap;}
    .trust-item{display:flex;align-items:center;gap:6px;}

    /* Error banner */
    .error-banner{background:#FEF2F2;border:1px solid #FCA5A5;border-left:3px solid var(--error);
                  padding:12px 16px;font-size:0.8125rem;color:#7F1D1D;margin-bottom:16px;}

    /* Spinner */
    .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;
             border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* Footer */
    .site-footer{border-top:1px solid var(--border);padding:24px;text-align:center;
                 font-size:0.75rem;color:var(--muted);}

    @media(max-width:480px){
      main{margin:32px auto;}.card{padding:20px;}
      .pkg-row{flex-direction:column;}.pkg-price{text-align:left;}
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="site-header">
  <div class="header-inner">
    <a href="./index.html" class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <rect x="1" y="1" width="26" height="26" stroke="#0F3D2E" stroke-width="1.2"/>
        <rect x="5" y="5" width="18" height="18" stroke="#C6A75E" stroke-width="0.8"/>
        <line x1="14" y1="5" x2="14" y2="23" stroke="#0F3D2E" stroke-width="0.8"/>
        <line x1="5" y1="14" x2="23" y2="14" stroke="#0F3D2E" stroke-width="0.8"/>
      </svg>
      <span class="logo-text">Mithaq</span>
    </a>
    <span class="secure-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Secure Checkout
    </span>
  </div>
</header>

<main>
  <p class="breadcrumb"><a href="./index.html">Mithaq</a> &nbsp;›&nbsp; Purchase</p>
  <span class="gold-rule"></span>
  <p class="label">Secure Payment</p>
  <h1>Complete Your Agreement</h1>
  <p class="page-sub">Review your selection and proceed to secure payment via Stripe.</p>

  <!-- App container, populated by JS -->
  <div id="app"></div>
</main>

<!-- Footer -->
<footer class="site-footer">
  <p>© 2026 Mithaq. All rights reserved.&nbsp;·&nbsp;
    <a href="./index.html#contact" style="color:inherit;">Contact Support</a>
  </p>
</footer>

<script>
'use strict';

const SUPABASE_URL = 'https://xbbdigovnztxoxpydjav.supabase.co';
const API_BASE     = `${SUPABASE_URL}/functions/v1`;

// AED-only package catalogue
const PACKAGES = {
  'prenup-standard': {
    name:    'Silver — Standard Agreement',
    tagline: 'For straightforward prenuptial agreements',
    price:   'AED 2,500',
    features: [
      'Up to 3 assets',
      '1 jurisdiction (country)',
      'Up to 2 beneficiaries',
      'Standard clause structure',
      'Digital drafting & signing',
      'Tamper-proof vault storage',
    ],
  },
  'prenup-gold': {
    name:    'Gold — Premium Agreement',
    tagline: 'For expanded asset coverage and cross-border arrangements',
    price:   'AED 4,900',
    features: [
      'Up to 8 assets',
      'Up to 2 jurisdictions',
      'Up to 4 beneficiaries',
      'Custom asset allocation',
      'Cross-border clause support',
      'Priority document generation',
    ],
  },
  'prenup-platinum': {
    name:    'Platinum — Advanced Agreement',
    tagline: 'For multi-jurisdiction and business asset inclusion',
    price:   'AED 9,500',
    features: [
      'Up to 20 assets',
      'Up to 5 jurisdictions',
      'Up to 8 beneficiaries',
      'Business ownership structuring',
      'Advanced inheritance logic',
      'Legal audit layer',
      'Express processing',
    ],
  },
  'prenup-diamond': {
    name:    'Diamond — Comprehensive Agreement',
    tagline: 'For unlimited, fully bespoke agreement structures',
    price:   'AED 18,000',
    features: [
      'Unlimited assets',
      'Unlimited jurisdictions',
      'Unlimited beneficiaries',
      'Custom clause drafting',
      'Dedicated onboarding support',
      'Integrated legal review option',
      '24-hour fast-track preparation',
    ],
  },
};

const state = {
  packageId:  null,
  pkg:        null,
  email:      '',
  submitting: false,
  error:      null,
};

document.addEventListener('DOMContentLoaded', () => {
  const params      = new URLSearchParams(window.location.search);
  state.packageId   = params.get('package');
  state.pkg         = PACKAGES[state.packageId];

  const cancelled = params.get('cancelled') === '1';
  if (cancelled) {
    state.error = 'Your previous payment was not completed. No charge was made. You can try again below.';
  }

  if (!state.pkg) {
    renderInvalidPackage();
    return;
  }

  render();
});

function render() {
  const app = document.getElementById('app');
  const { pkg, email, submitting, error } = state;

  app.innerHTML = `
    ${error ? `<div class="error-banner">${escapeHtml(error)}</div>` : ''}

    <!-- Package summary -->
    <div class="card">
      <p class="card-title">Your Package</p>
      <div class="pkg-row">
        <div class="pkg-info">
          <p class="pkg-name">${escapeHtml(pkg.name)}</p>
          <p class="pkg-tag">${escapeHtml(pkg.tagline)}</p>
        </div>
        <div class="pkg-price">
          <p class="pkg-amount">${pkg.price}</p>
          <p class="pkg-once">One-Time Fee</p>
        </div>
      </div>
      <ul class="features">
        ${pkg.features.map(f => `
          <li class="feat">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <rect x="0.5" y="0.5" width="15" height="15" stroke="#C6A75E" stroke-width="0.8"/>
              <path d="M4 8l3 3 5-5" stroke="#0F3D2E" stroke-width="1.2" stroke-linecap="square"/>
            </svg>
            <span>${escapeHtml(f)}</span>
          </li>
        `).join('')}
      </ul>
    </div>

    <!-- AED-only currency note -->
    <div class="currency-note">
      All prices are listed in AED. International payments are automatically converted by your card provider at the prevailing exchange rate.
    </div>

    <!-- Email form -->
    <div class="card">
      <p class="card-title">Contact Information</p>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-input"
               value="${escapeHtml(email)}"
               placeholder="you@example.com" autocomplete="email"
               ${submitting ? 'disabled' : ''}>
        <p class="form-help">Your payment confirmation and account details will be sent to this address.</p>
      </div>

      <!-- Total -->
      <div class="total-row">
        <span class="total-label">Total Due Today</span>
        <span class="total-amount">${pkg.price}</span>
      </div>

      <!-- Submit -->
      <button class="btn-primary" id="submit-btn" ${submitting ? 'disabled' : ''}>
        ${submitting
          ? `<span class="spinner"></span><span>Redirecting to Stripe…</span>`
          : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
             <span>Proceed to Secure Payment</span>`
        }
      </button>
      <a href="./index.html#pricing" class="btn-secondary">Change Package</a>
    </div>

    <!-- Trust row -->
    <div class="trust-row">
      <span class="trust-item">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1l3 6 6 1-4.5 4 1 6-5.5-3-5.5 3 1-6L3 8l6-1z"/></svg>
        Stripe Secured
      </span>
      <span class="trust-item">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        PCI Compliant
      </span>
      <span class="trust-item">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Instant Confirmation
      </span>
    </div>
  `;

  // Wire up event handlers
  const emailInput = document.getElementById('email');
  if (emailInput) {
    emailInput.addEventListener('input', e => { state.email = e.target.value; });
  }
  const submitBtn = document.getElementById('submit-btn');
  if (submitBtn) {
    submitBtn.addEventListener('click', handleSubmit);
  }
}

async function handleSubmit() {
  state.error = null;

  const email = state.email.trim();
  if (!email || !email.includes('@') || !email.includes('.')) {
    state.error = 'Please enter a valid email address.';
    render();
    return;
  }

  state.submitting = true;
  render();

  try {
    const res = await fetch(`${API_BASE}/create-checkout-session`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, package: state.packageId }),
    });
    const data = await res.json();

    if (!res.ok || !data.url) {
      throw new Error(data.error || 'Could not initiate payment.');
    }

    // Redirect to Stripe Checkout
    window.location.href = data.url;
  } catch (err) {
    state.error      = (err && err.message) || 'Could not connect to payment system. Please try again.';
    state.submitting = false;
    render();
  }
}

function renderInvalidPackage() {
  document.getElementById('app').innerHTML = `
    <div class="error-banner">Invalid or missing package selection.</div>
    <a href="./index.html#pricing" class="btn-secondary">Return to Pricing</a>
  `;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
</script>
</body>
</html>
