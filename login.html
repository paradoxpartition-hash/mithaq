<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Mithaq</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #b8922a;
      --dark:    #0e0e0e;
      --forest:  #0F3D2E;
      --light:   #f5f2ec;
      --border:  #ddd8ce;
      --muted:   #888;
      --text:    #2a2a2a;
      --error:   #c0392b;
    }

    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background: var(--light);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* ── LEFT PANEL ─────────────────────────────────────── */
    .panel-left {
      background: var(--dark);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }
    .panel-left::before {
      content: '';
      position: absolute;
      top: -20%; right: -10%;
      width: 400px; height: 400px;
      border: 1px solid rgba(184,146,42,0.15);
      border-radius: 50%;
      pointer-events: none;
    }
    .panel-left::after {
      content: '';
      position: absolute;
      bottom: -15%; left: -8%;
      width: 300px; height: 300px;
      border: 1px solid rgba(184,146,42,0.1);
      border-radius: 50%;
      pointer-events: none;
    }
    .panel-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.15em;
      text-decoration: none;
    }
    .panel-tagline { position: relative; z-index: 1; }
    .panel-tagline blockquote {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.6rem;
      font-weight: 300;
      color: rgba(255,255,255,0.85);
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    .panel-tagline p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .panel-footer { font-size: 0.75rem; color: rgba(255,255,255,0.25); }

    /* ── RIGHT PANEL ────────────────────────────────────── */
    .panel-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 4rem;
      overflow-y: auto;
    }
    .form-container { width: 100%; max-width: 380px; }

    .form-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--dark);
      margin-bottom: 0.4rem;
    }
    .form-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* ── ALERTS ─────────────────────────────────────────── */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 2px;
      font-size: 0.85rem;
      margin-bottom: 1.2rem;
      display: none;
      line-height: 1.5;
    }
    .alert-error   { background: #fff5f5; border: 1px solid #fcc; color: var(--error); display: block; }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; display: block; }
    .alert-info    { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; display: block; }

    /* ── FORM ───────────────────────────────────────────── */
    .form-group { margin-bottom: 1.2rem; }
    label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: #fff;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--gold); }

    .password-wrap { position: relative; }
    .toggle-pw {
      position: absolute;
      right: 1rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: var(--muted);
      font-size: 0.75rem; letter-spacing: 0.05em;
      padding: 0;
    }

    /* ── BUTTONS ────────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: 0.9rem;
      background: var(--dark);
      color: #fff;
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      border-radius: 2px;
      margin-top: 0.5rem;
    }
    .btn-primary:hover:not(:disabled) { background: #1a1a1a; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── DIVIDER ────────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.4rem 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }
    .divider span {
      font-size: 0.75rem; color: var(--muted);
      letter-spacing: 0.08em; white-space: nowrap;
    }

    /* ── SOCIAL BUTTONS ─────────────────────────────────── */
    .social-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn-social {
      width: 100%;
      padding: 0.82rem;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      font-family: 'Jost', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      text-decoration: none;
    }

    /* Google button */
    .btn-google:hover {
      border-color: #4285F4;
      box-shadow: 0 1px 6px rgba(66,133,244,0.15);
    }
    .btn-google svg { flex-shrink: 0; }

    /* UAE PASS button */
    .btn-uaepass:hover {
      border-color: #00a651;
      background: #f9fdf9;
    }
    .uaepass-badge {
      background: #00a651;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 0.15rem 0.4rem;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── FOOTER LINKS ───────────────────────────────────── */
    .form-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.8;
    }
    .form-footer a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
    }
    .form-footer a:hover { border-color: var(--gold); }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 768px) {
      body { grid-template-columns: 1fr; }
      .panel-left { display: none; }
      .panel-right { padding: 2rem; justify-content: flex-start; padding-top: 3rem; }
    }
  </style>
</head>
<body>

  <!-- Left branding panel -->
  <div class="panel-left">
    <a href="/mithaq/" class="panel-logo">MITHAQ</a>
    <div class="panel-tagline">
      <blockquote>"Clarity before commitment."</blockquote>
      <p>Secure access to your agreement portal</p>
    </div>
    <p class="panel-footer">© 2026 Mithaq. All rights reserved.</p>
  </div>

  <!-- Right login panel -->
  <div class="panel-right">
    <div class="form-container">

      <h1 class="form-title">Sign In</h1>
      <p class="form-subtitle">Access your Mithaq account to manage your agreement.</p>

      <div id="alert" class="alert" role="alert"></div>

      <!-- Email / Password form -->
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" autocomplete="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Your password" required />
            <button type="button" class="toggle-pw" id="toggle-pw">Show</button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="submit-btn">Sign In</button>
      </form>

      <div class="divider"><span>or continue with</span></div>

      <!-- Social login buttons -->
      <div class="social-buttons">

        <!-- Google -->
        <button class="btn-social btn-google" id="google-btn">
          <!-- Official Google G logo -->
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
            <path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </button>

        <!-- UAE PASS -->
        <button class="btn-social btn-uaepass" id="uaepass-btn">
          <span class="uaepass-badge">UAE</span>
          Sign in with UAE PASS
        </button>

      </div>

      <div class="form-footer">
        <p>Don't have an account? <a href="/mithaq/purchase.html">Create one here</a> to get started.</p>
        <p>Forgot your password? <a href="#" id="reset-link">Send reset link</a></p>
      </div>

    </div>
  </div>

  <script src="/mithaq/mithaq-api.js"></script>
  <script>
    (function () {
      const SUPABASE_URL  = MithaqAPI.SUPABASE_URL;
      const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiYmRpZ292bnp0eG94cHlkamF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjEyNTQsImV4cCI6MjA5MTEzNzI1NH0.KowtdA94sOokbvh5C5aTHV75e15cX6vY8vEvuX5qEMs";

      const form       = document.getElementById("login-form");
      const emailEl    = document.getElementById("email");
      const passwordEl = document.getElementById("password");
      const submitBtn  = document.getElementById("submit-btn");
      const alertEl    = document.getElementById("alert");
      const togglePw   = document.getElementById("toggle-pw");
      const googleBtn  = document.getElementById("google-btn");
      const uaepassBtn = document.getElementById("uaepass-btn");
      const resetLink  = document.getElementById("reset-link");

      // ── Redirect if already logged in ──────────────────────────────
      if (MithaqAPI.auth.isAuthenticated()) {
        const params      = new URLSearchParams(window.location.search);
        const packageType = params.get("package") || "";
        const returnTo    = params.get("returnTo") ||
          (packageType ? `/mithaq/dashboard.html?package=${encodeURIComponent(packageType)}` : "/mithaq/dashboard.html");
        window.location.href = returnTo;
        return;
      }

      // ── Handle magic link / recovery in URL hash ────────────────────
      if (window.location.hash.includes("access_token")) {
        showAlert("Completing sign-in…", "info");
        MithaqAPI.auth.handleMagicLink().then(result => {
          if (result?.session) {
            const params   = new URLSearchParams(window.location.search);
            const returnTo = params.get("returnTo") || "/mithaq/dashboard.html";
            window.location.href = returnTo;
          } else {
            showAlert("Login link expired or invalid. Please request a new one.", "error");
          }
        });
        return;
      }

      function showAlert(msg, type) {
        alertEl.textContent = msg;
        alertEl.className   = `alert alert-${type}`;
      }
      function clearAlert() { alertEl.className = "alert"; alertEl.textContent = ""; }

      // ── Toggle password visibility ─────────────────────────────────
      togglePw.addEventListener("click", function () {
        const isText = passwordEl.type === "text";
        passwordEl.type      = isText ? "password" : "text";
        togglePw.textContent = isText ? "Show" : "Hide";
      });

      // ── Email / Password login ─────────────────────────────────────
      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        MithaqAPI.ui.clearErrors(form);
        clearAlert();

        const email    = emailEl.value.trim();
        const password = passwordEl.value;

        let valid = true;
        if (!email || !email.includes("@")) {
          MithaqAPI.ui.fieldError(emailEl, "Please enter a valid email address.");
          valid = false;
        }
        if (!password) {
          MithaqAPI.ui.fieldError(passwordEl, "Please enter your password.");
          valid = false;
        }
        if (!valid) return;

        MithaqAPI.ui.setButtonLoading(submitBtn, true, "Signing in…");

        try {
          await MithaqAPI.auth.signIn(email, password);
          const params   = new URLSearchParams(window.location.search);
          const returnTo = params.get("returnTo") || "/mithaq/dashboard.html";
          window.location.href = returnTo;
        } catch (err) {
          const msg = err.message || "Sign in failed.";
          if (msg.toLowerCase().includes("invalid")) {
            showAlert("Incorrect email or password. Please try again.", "error");
          } else if (msg.toLowerCase().includes("email not confirmed")) {
            showAlert("Please check your email and click the confirmation link first.", "info");
          } else {
            showAlert(msg, "error");
          }
          MithaqAPI.ui.setButtonLoading(submitBtn, false);
        }
      });

      // ── Google OAuth ───────────────────────────────────────────────
      // Uses Supabase's built-in Google OAuth — no client ID needed in frontend
      googleBtn.addEventListener("click", async function () {
        MithaqAPI.ui.setButtonLoading(googleBtn, true, "Redirecting…");
        clearAlert();
        try {
          const params   = new URLSearchParams(window.location.search);
          const returnTo = params.get("returnTo") || "/mithaq/dashboard.html";

          // Build the redirect URL — Supabase handles the full OAuth flow
          const redirectTo = encodeURIComponent(
            window.location.origin + "/mithaq/login.html?returnTo=" + encodeURIComponent(returnTo)
          );

          const authUrl = `${SUPABASE_URL}/auth/v1/authorize` +
            `?provider=google` +
            `&redirect_to=${redirectTo}`;

          window.location.href = authUrl;
        } catch (err) {
          showAlert("Google sign-in failed. Please try again.", "error");
          MithaqAPI.ui.setButtonLoading(googleBtn, false);
        }
      });

      // ── UAE PASS ───────────────────────────────────────────────────
      uaepassBtn.addEventListener("click", function () {
        const clientId   = "mithaq_uaepass"; // Update with real Client ID when available
        const redirectUri = encodeURIComponent(
          window.location.origin + "/mithaq/auth/uaepass-callback.html"
        );
        const state = btoa(JSON.stringify({
          returnTo: new URLSearchParams(window.location.search).get("returnTo") || "/mithaq/dashboard.html",
          nonce:    Math.random().toString(36).slice(2),
        }));
        const authUrl = `https://stg-id.uaepass.ae/idshub/authorize` +
          `?response_type=code` +
          `&client_id=${clientId}` +
          `&scope=urn:uae:digitalid:profile:general` +
          `&redirect_uri=${redirectUri}` +
          `&state=${state}` +
          `&acr_values=urn:safelayer:tws:policies:authentication:level:low`;
        window.location.href = authUrl;
      });

      // ── Password reset ─────────────────────────────────────────────
      resetLink.addEventListener("click", async function (e) {
        e.preventDefault();
        const email = emailEl.value.trim();
        if (!email || !email.includes("@")) {
          MithaqAPI.ui.fieldError(emailEl, "Enter your email address above first.");
          return;
        }
        resetLink.textContent = "Sending…";
        try {
          await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON },
            body: JSON.stringify({ email }),
          });
          showAlert("Password reset link sent. Check your inbox.", "success");
        } catch (_) {
          showAlert("Could not send reset email. Please try again.", "error");
        }
        resetLink.textContent = "Send reset link";
      });

    })();
  </script>
</body>
</html>
