<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Completing Sign In — Mithaq</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background: #f5f2ec;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .wrap { text-align: center; max-width: 400px; padding: 2rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid #ddd;
      border-top-color: #b8922a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #888; font-size: 0.9rem; }
    .error { color: #c0392b; margin-top: 1rem; font-size: 0.85rem; }
    a { color: #2a2a2a; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner" id="spinner"></div>
    <p id="msg">Completing your Google sign-in…</p>
    <p class="error" id="err" style="display:none"></p>
  </div>

  <script src="/mithaq/mithaq-api.js"></script>
  <script>
    (async function () {
      const msgEl   = document.getElementById("msg");
      const errEl   = document.getElementById("err");
      const spinner = document.getElementById("spinner");

      function fail(msg) {
        spinner.style.display = "none";
        msgEl.textContent     = "Sign-in failed.";
        errEl.innerHTML       = msg + ' — <a href="/mithaq/login.html">Return to login</a>';
        errEl.style.display   = "block";
      }

      // Supabase returns the session in the URL hash after Google OAuth
      // Handle it the same way as magic links
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken = params.get("access_token");
      const error       = params.get("error");
      const errorDesc   = params.get("error_description");

      // Also check query params (some flows use ?code=)
      const qParams  = new URLSearchParams(window.location.search);
      const returnTo = qParams.get("returnTo") || "/mithaq/dashboard.html";

      if (error) {
        fail(errorDesc || error);
        return;
      }

      if (accessToken) {
        // Session is in hash — handle it via MithaqAPI
        const result = await MithaqAPI.auth.handleMagicLink();
        if (result?.session) {
          window.location.href = returnTo;
        } else {
          fail("Could not establish session. Please try again.");
        }
        return;
      }

      // If no token in hash, something went wrong
      fail("No session token received from Google.");
    })();
  </script>
</body>
</html>
